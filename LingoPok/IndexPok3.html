<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POK — Credenciales Digitales Verificables · Blockchain NFT</title>
  <meta name="description" content="POK — Plataforma global para emitir credenciales digitales verificables y microcredenciales como NFT en blockchain. Confianza de 1100+ universidades.">

  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <a href="#" class="logo">
      <img src="img/edunexus-lingo-logo.png" alt="EduNexus Lingo Logo" style="height: 40px;">
      <span style="margin-left: 10px; font-weight: 600; color: #1f2937;">POK</span>
    </a>
    <div class="menu-toggle" id="menuToggle">
      <span></span><span></span><span></span>
    </div>
    <nav id="mainNav">
      <div class="lang-selector">
        <img src="https://flagcdn.com/w40/es.png" class="lang-flag active" data-lang="es" onclick="changeLanguage('es')">
        <img src="https://flagcdn.com/w40/gb.png" class="lang-flag" data-lang="en" onclick="changeLanguage('en')">
      </div>
      <a href="#features" data-i18n="nav_features">Características</a>
      <a href="#integrations" data-i18n="nav_team">Integraciones</a>
      <a href="#contact" class="btn-contact" data-i18n="nav_contact">Contactar</a>
      <a href="https://www.edunexus.eu/index.html" class="btn-back">← Volver</a>
    </nav>
  </header>

  <section class="hero" id="inicio">
    <div class="hero-content">
      <span class="hero-eyebrow" data-i18n="hero_badge">Credenciales Digitales Verificables</span>
      <h1 data-i18n="hero_h1">Emite credenciales digitales verificables y microcredenciales como NFT en blockchain</h1>
      <p data-i18n="hero_desc">Confianza de más de 1.100 universidades en 19 países.</p>
      <div class="hero-buttons">
        <button class="btn btn-primary">100% GRATIS</button>
      </div>
    </div>
  </section>

  <section id="contact" class="contact-section">
    <div class="section-header fade-in">
      <span class="section-eyebrow" data-i18n="contact_title">Contacto</span>
      <h2 data-i18n="contact_title">Ponte en Contacto</h2>
      <div class="gold-divider"></div>
    </div>
    
    <div class="contact-content">
      <div class="contact-form-wrapper fade-in">
        <form id="pokForm" class="contact-form" action="https://formspree.io/f/mlgonool" method="POST">
          <div class="form-group full-width">
            <label for="organization" data-i18n="contact_form_organization">Organización</label>
            <input type="text" id="organization" name="organization" class="form-input" required>
          </div>
          
          <div class="form-group full-width">
            <label for="email" data-i18n="contact_form_email">Correo <span class="required">*</span></label>
            <input type="email" id="email" name="email" class="form-input" required>
          </div>
          
          <div class="form-group full-width">
            <label for="message" data-i18n="contact_form_message">Detalles Adicionales</label>
            <textarea id="message" name="message" class="form-textarea" rows="5" required></textarea>
          </div>
          
          <button type="submit" id="submitBtn" class="btn btn-primary btn-submit" data-i18n="contact_form_submit">Enviar</button>
          <div id="form-status" style="margin-top:15px; text-align:center;"></div>
        </form>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 POK - Proof of Knowledge.</p>
  </footer>

  <script src="js/translations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
