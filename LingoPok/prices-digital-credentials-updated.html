<!DOCTYPE html><html lang="en">
<head>
    <meta charSet="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Pricing | Verifiable Digital Credential Solutions for Institutions | POK</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
    <style>
        /* Estilos base para emular Material UI y la estética de POK */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f1f6ff;
            color: #1E1E1E;
        }
        
        .contact-section {
            padding: 80px 16px;
            background: linear-gradient(0deg, #f1f6ff 0%, #fff 100%);
            display: flex;
            justify-content: center;
        }
        
        .contact-container {
            width: 100%;
            max-width: 700px;
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0px 10px 30px rgba(81, 36, 166, 0.05);
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .section-badge {
            display: inline-block;
            background: rgba(81, 36, 166, 0.1);
            color: #5124A6;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .section-title {
            color: #5124A6;
            font-size: 32px;
            font-weight: 700;
            margin: 0;
        }
        
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }
        
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #5124A6;
            margin-left: 4px;
        }
        
        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #E0E0E0;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: #FAFAFA;
        }
        
        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #5124A6;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(81, 36, 166, 0.1);
        }
        
        .form-submit {
            background-color: #5124A6;
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(81, 36, 166, 0.2);
        }
        
        .form-submit:hover {
            background-color: #3e1b80;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(81, 36, 166, 0.3);
        }
        
        .contact-footer {
            margin-top: 32px;
            text-align: center;
            border-top: 1px solid #F0F0F0;
            padding-top: 24px;
        }
        
        .contact-footer p {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .contact-footer a {
            color: #5124A6;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
        }
        
        .contact-footer a:hover {
            text-decoration: underline;
        }

        #formMessage {
            display: none;
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
        }
        
        .success-msg {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        
        .error-msg {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        @media (max-width: 600px) {
            .contact-container {
                padding: 24px;
            }
            .section-title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

    <!-- Contact Section -->
    <section class="contact-section" id="contact">
        <div class="contact-container">
            <div class="section-header">
                <div class="section-badge">Contacto</div>
                <h2 class="section-title">Ponte en Contacto</h2>
            </div>
            
            <form class="contact-form" id="contactForm" action="https://formspree.io/f/mqegbwqa" method="POST">
                <div class="form-group">
                    <label for="organization">Organización</label>
                    <input type="text" id="organization" name="organization" placeholder="Nombre de tu institución" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Correo Electrónico *</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Teléfono (Opcional)</label>
                    <input type="tel" id="phone" name="phone" placeholder="+XX XXX XXX XXXX">
                </div>
                
                <div class="form-group">
                    <label for="message">Mensaje *</label>
                    <textarea id="message" name="message" rows="5" placeholder="¿En qué podemos ayudarte?" required></textarea>
                </div>
                
                <button type="submit" class="form-submit">Enviar Mensaje</button>
            </form>
            
            <div id="formMessage"></div>
            
            <div class="contact-footer">
                <p>¿Preguntas? Contáctanos directamente:</p>
                <a href="mailto:pok.tech@EduNexus.eu">pok.tech@EduNexus.eu</a>
            </div>
        </div>
    </section>

    <script>
        const form = document.getElementById('contactForm');
        const messageDiv = document.getElementById('formMessage');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            
            // Feedback visual de carga
            const submitBtn = form.querySelector('button');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Enviando...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    messageDiv.innerText = "¡Gracias! Tu mensaje ha sido enviado correctamente.";
                    messageDiv.className = "success-msg";
                    messageDiv.style.display = "block";
                    form.reset();
                } else {
                    const data = await response.json();
                    throw new Error(data.errors ? data.errors.map(e => e.message).join(", ") : "Error al enviar");
                }
            } catch (error) {
                messageDiv.innerText = "Ups! Hubo un problema: " + error.message;
                messageDiv.className = "error-msg";
                messageDiv.style.display = "block";
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
