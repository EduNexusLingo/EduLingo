<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNexus · Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
            background: linear-gradient(145deg, #f9faff 0%, #f0f3fd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            padding: 3rem 2rem;
            border-radius: 48px;
            box-shadow: 0 20px 40px -10px rgba(0,20,80,0.15),
                        0 0 0 1px rgba(255,255,255,0.5) inset;
        }

        /* Logo como imagen */
        .logo-img {
            max-width: 100%;
            height: auto;
            max-height: 200px; /* Ajusta según el tamaño real de tu logo */
            margin-bottom: 2rem;
            display: inline-block;
        }

        /* Mensaje principal */
        .message {
            margin: 2.5rem 0 2rem 0;
        }

        .under-construction {
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 600;
            color: #10233e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .under-construction span {
            background: #f0b71c;
            color: #1e2f50;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-size: 0.9em;
            white-space: nowrap;
        }

        .icon-construction {
            font-size: 1.5em;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.1));
        }

        .description {
            font-size: 1.3rem;
            color: #3d4f72;
            margin-top: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .dots {
            margin: 2rem 0;
        }

        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #2b4b8f;
            border-radius: 50%;
            margin: 0 6px;
            opacity: 0.4;
            animation: pulse 1.5s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.3s; }
        .dot:nth-child(3) { animation-delay: 0.6s; }

        @keyframes pulse {
            0%,100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.95rem;
            color: #5a6e92;
        }

        hr {
            width: 80px;
            margin: 1.5rem auto 1rem auto;
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #9bb1d1, transparent);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo como imagen (asegúrate de que logo.png esté en la misma carpeta) -->
	  <div class="logo">
            <span class="under-construction">Edu Nexus Lingo</span>
        </div>
        <img src="logo.png" alt="EduNexus Logo" class="logo-img">

        <!-- Mensaje de construcción -->
        <div class="message">
            <div class="under-construction">
                <span class="icon-construction">🚧</span>
                under construction
                <span class="icon-construction">🚧</span>
            </div>
            <div class="description">
                Estamos preparando algo increíble para ti.
            </div>
        </div>

        <!-- Pequeño detalle animado -->
        <div class="dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <hr>
        <footer>
            Edu Nexus Lingo· Próximamente
        </footer>
    </div>
</body>
</html>
